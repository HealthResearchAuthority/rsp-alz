# This workflow will deploy the network resources
name: dw-network-deployment
trigger:
  - main

jobs:
  - job: lint
    pool:
      vmImage: 'ubuntu-latest'
    steps:
      - checkout: self
      - bash: |
          az bicep install
          az bicep version
        displayName: 'Install Bicep CLI'
      - bash: az bicep build --file ./datawarehouse/main.network.bicep

  - job: validate
    pool:
      vmImage: 'ubuntu-latest'
    dependsOn: lint
    steps:
      - checkout: self
      - bash: |
          az bicep install
          az bicep version
        displayName: 'Install Bicep CLI'
      - task: AzureCLI@2
        inputs:
          azureSubscription: $(${{ parameters.env }})
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az deployment sub validate --name "DW-Network-$(Build.BuildId)" --location $(location) --template-file ./datawarehouse/main.network.bicep \
              --parameters ./datawarehouse/main.network.bicepparam

  - job: preview
    pool:
      vmImage: 'ubuntu-latest'
    dependsOn: [lint, validate]
    steps:
      - checkout: self
      - bash: |
          az bicep install
          az bicep version
        displayName: 'Install Bicep CLI'
      - task: AzureCLI@2
        inputs:
          azureSubscription: $(${{ parameters.env }})
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            az config set bicep.use_binary_from_path=false --only-show-errors
            az deployment sub what-if --location $(location) --template-file ./datawarehouse/main.network.bicep \
              --parameters ./datawarehouse/main.network.bicepparam

  - job: deploy
    pool:
      vmImage: 'ubuntu-latest'
    dependsOn: [lint, validate, preview]
    steps:
      - checkout: self
      - bash: |
          az bicep install
          az bicep version
        displayName: 'Install Bicep CLI'
      - task: AzureCLI@2
        name: deploy
        inputs:
          azureSubscription: $(${{ parameters.env }})
          scriptType: bash
          scriptLocation: inlineScript
          failOnStandardError: true
          inlineScript: |
            az config set bicep.use_binary_from_path=false --only-show-errors
            output=$(az stack sub create --name "dw-network-deployment-stack" --location $(location) --template-file ./datawarehouse/main.network.bicep \
              --parameters ./datawarehouse/main.network.bicepparam \
                           --deny-settings-mode none --action-on-unmanage detach --yes)
            echo $output | jq .
            appResourceGroup=$(echo $output | jq -r '.properties.outputs.appResourceGroupName.value')
            echo "##vso[task.setvariable variable=appResourceGroupName;isoutput=true]$appResourceGroup"