# This workflow will deploy the network resources
name: datawarehouse-network-deployment
trigger: none
pr:
  branches:
    include:
      - main
  paths:
    include:
      - '7.datawarehouse/main.network.bicep'
      - '7.datawarehouse/network-parameters/**'

variables:
  - group: 'datawarehouse'

parameters:
  - name: env
    displayName: Environment
    type: string
    default: dev
    values:
      - dev

stages:
  - stage: PRValidation
    displayName: 'PR Validation for Datawarehouse Network'
    condition: eq(variables['Build.Reason'], 'PullRequest')

    jobs:
      - job: lint
        displayName: 'Lint Datawarehouse Templates'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - bash: |
              az bicep install
              az bicep version
            displayName: 'Install Bicep CLI'
          - bash: az bicep build --file ./datawarehouse/main.network.bicep
            displayName: 'Lint Bicep Templates'

      - job: validate
        displayName: 'Validate Datawarehouse Bicep Templates'
        pool:
          vmImage: 'ubuntu-latest'
        dependsOn: lint
        condition: succeeded()
        steps:
          - checkout: self
          - bash: |
              az bicep install
              az bicep version
            displayName: 'Install Bicep CLI'
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(azureSubscription) #or $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az config set bicep.use_binary_from_path=false --only-show-errors
                az deployment sub validate --name "DatawarehouseNetwork-Validation-$(Build.BuildId)" \
                  --location $(location) \
                  --template-file ./datawarehouse/main.network.bicep \
                  --parameters ./datawarehouse/network-parameters/{{ parameters.env }}.parameters.bicepparam \
                                GatewayIp=$(GatewayIp) \
                                bgpPeeringAddress=$(bgpPeeringAddress)

      - job: preview
        displayName: 'Preview Network Deployment'
        pool:
          vmImage: 'ubuntu-latest'
        dependsOn: [lint, validate]
        condition: succeeded()
        steps:
          - checkout: self
          - bash: |
              az bicep install
              az bicep version
            displayName: 'Install Bicep CLI'
          - task: AzureCLI@2
            displayName: 'What-If Analysis'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az config set bicep.use_binary_from_path=false --only-show-errors
                az deployment sub what-if \
                  --location $(location) \
                  --template-file ./datawarehouse/main.network.bicep \
                  --parameters ./datawarehouse/network-parameters/{{ parameters.env }}.parameters.bicepparam \
                                GatewayIp=$(GatewayIp) \
                                bgpPeeringAddress=$(bgpPeeringAddress)

  - stage: ManualDeployment
    displayName: 'Manual Deployment - Datawarehouse Network'
    dependsOn: []
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: PreDeploymentCheck
        displayName: 'Pre-Deployment Validation'
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - checkout: self
          - bash: |
              az bicep install
              az bicep version
            displayName: 'Install Bicep CLI'
          - task: AzureCLI@2
            displayName: 'What-If Analysis'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az config set bicep.use_binary_from_path=false --only-show-errors
                az deployment sub what-if \
                  --location $(location) \
                  --template-file ./datawarehouse/main.network.bicep \
                  --parameters ./datawarehouse/network-parameters/{{ parameters.env }}.parameters.bicepparam \
                                GatewayIp=$(GatewayIp) \
                                bgpPeeringAddress=$(bgpPeeringAddress)
      - deployment: deployNetwork
        displayName: 'Deploy Datawarehouse Network'
        pool:
          vmImage: 'ubuntu-latest'
        dependsOn: [PreDeploymentCheck]
        condition: succeeded()
        environment: 'datawarehouse-deployment'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self
                - bash: |
                    az bicep install
                    az bicep version
                  displayName: 'Install Bicep CLI'
                - task: AzureCLI@2
                  name: deployNetwork
                  displayName: 'Deploy Datawarehouse Network'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: bash
                    scriptLocation: inlineScript
                    failOnStandardError: true
                    inlineScript: |
                      az config set bicep.use_binary_from_path=false --only-show-errors
                      output=$(az stack sub create --name "dw-network-deployment-stack" \
                        --location $(location) \
                        --template-file ./datawarehouse/main.network.bicep \
                        --parameters ./datawarehouse/network-parameters/{{ parameters.env }}.parameters.bicepparam \
                        GatewayIp=$(GatewayIp) \
                        bgpPeeringAddress=$(bgpPeeringAddress) \
                        --deny-settings-mode none --action-on-unmanage detach --yes)
                      echo $output | jq .
                      appResourceGroup=$(echo $output | jq -r '.properties.outputs.appResourceGroupName.value')
                      echo "##vso[task.setvariable variable=appResourceGroupName;isoutput=true]$appResourceGroup"